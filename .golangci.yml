version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - gosec
    - ineffassign
    - staticcheck
    - unused

  settings:
    gosec:
      excludes:
        - G104  # Audit errors not checked (errcheck покрывает лучше)

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
