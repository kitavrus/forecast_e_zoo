# Минимальный tuning для PostgreSQL 18 в dev/test-окружении.
# Production-tuning делается через отдельный конфиг в инфраструктуре.

listen_addresses = '*'
max_connections = 100

# Memory
shared_buffers = 256MB
work_mem = 8MB
maintenance_work_mem = 64MB

# WAL
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# Logging
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 500
log_line_prefix = '%t [%p]: db=%d,user=%u '

# Locale (initdb fixed via POSTGRES_INITDB_ARGS, дублируем тут для ясности)
datestyle = 'iso, dmy'
timezone = 'UTC'
